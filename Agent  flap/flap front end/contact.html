<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Agent Flap</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
    body{background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;}
    nav{background:#162447;padding:15px;display:flex;justify-content:space-between;align-items:center;}
    nav h1{color:#f73859;}
    nav a{color:#e0e0e0;margin-left:20px;text-decoration:none;font-weight:bold;}
    nav a:hover{color:#f73859;}
    main{flex:1;padding:30px;display:flex;flex-direction:column;align-items:center;}
    h2{color:#f73859;margin-bottom:20px;}
    form{display:flex;flex-direction:column;width:90%;max-width:500px;}
    input, textarea{padding:10px;margin-bottom:15px;border-radius:5px;border:none;}
    button{padding:10px; border:none;border-radius:5px;background:#f73859;color:#fff;cursor:pointer;}
    button:hover{background:#ff0054;}
</style>
</head>
<body>

<nav>
    <h1>Agent Flap</h1>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<main>
    <h2>Contact Agent Flap</h2>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</main>

<script>
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', function(e){
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;
        alert(`Thank you, ${name}! Your message has been sent.\nEmail: ${email}\nMessage: ${message}`);
        form.reset();
    });
</script>

</body>
</html>
